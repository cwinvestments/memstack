# MemStack Pro — Gitleaks configuration
# Excludes test fixtures, example files, and non-sensitive directories

title = "MemStack Pro Gitleaks Config"

# Load gitleaks' built-in default ruleset. WITHOUT this, gitleaks uses ONLY the
# rules defined in this file - and there are none, which silently disables ALL
# secret detection (the allowlist below then filters an already-empty result).
[extend]
useDefault = true

[allowlist]
  description = "Global allowlist"

  paths = [
    '''\.env\.example$''',
    '''(^|/)fake-[^/]+/''',
    '''(^|/)fixtures/''',
    '''\.claude/diary/''',
    '''\.claude/observations/''',
    '''(^|/)test[-_]fixtures?/''',
    '''(^|/)__fixtures__/''',
    '''node_modules/''',
    '''\.git/''',
  ]
